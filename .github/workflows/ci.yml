# CI: tests en todo push/PR. Deploy a Firebase solo en push a main (o manual).
# El puente SR201 (scripts/deploy-sr201-bridge.ps1) NO se despliega desde aquí —
# sigue siendo manual desde la PC de planta.

name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            functions/package-lock.json
            frontend-libro-guardia/package-lock.json

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      - name: Test Cloud Functions
        working-directory: functions
        run: npm test

      - name: Install frontend dependencies
        working-directory: frontend-libro-guardia
        run: npm ci

      # CI=true: react-scripts test corre una sola vez y falla el job si hay fallos.
      # pretest ejecuta scripts/apply-brand.js (brand.js → index.html/manifest).
      - name: Test frontend
        working-directory: frontend-libro-guardia
        env:
          CI: "true"
        run: npm test -- --watchAll=false

      # CI=false: igual que scripts/deploy-firebase.ps1 — no abortar el build por warnings de ESLint.
      # prebuild aplica brand.js antes del build.
      - name: Build frontend
        working-directory: frontend-libro-guardia
        env:
          CI: "false"
        run: npm run build

      - name: Verify frontend build output
        working-directory: frontend-libro-guardia
        run: test -f build/index.html

  deploy:
    name: Deploy Firebase
    needs: test
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            functions/package-lock.json
            frontend-libro-guardia/package-lock.json

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend-libro-guardia
        run: npm ci

      - name: Build frontend
        working-directory: frontend-libro-guardia
        env:
          CI: "false"
        run: npm run build

      - name: Verify frontend build output
        working-directory: frontend-libro-guardia
        run: test -f build/index.html

      # Proyecto y target salen de .firebaserc / firebase.json (sin project id hardcodeado).
      - name: Deploy hosting + functions
        run: firebase deploy --only "hosting,functions" --non-interactive
